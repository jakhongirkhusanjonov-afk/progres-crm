<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for 3D effect -->
    <linearGradient id="textTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.4" flood-color="#1e3a8a"/>
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background subtle pattern -->
  <circle cx="250" cy="180" r="140" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.08"/>
  <circle cx="250" cy="180" r="155" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.05"/>
  
  <!-- Hexagon icon with compass -->
  <g filter="url(#shadow)">
    <path d="M 250 95 L 310 125 L 310 185 L 250 215 L 190 185 L 190 125 Z" 
          fill="url(#iconGrad)" 
          stroke="#1e3a8a" 
          stroke-width="3"/>
  </g>
  
  <!-- Inner detail -->
  <path d="M 250 108 L 300 133 L 300 177 L 250 202 L 200 177 L 200 133 Z" 
        fill="#1e40af" 
        opacity="0.7"/>
  
  <!-- Compass rose -->
  <g transform="translate(250, 155)">
    <!-- North pointer (red, prominent) -->
    <g filter="url(#glow)">
      <path d="M 0 -35 L -7 -18 L -2 -18 L -2 0 L 2 0 L 2 -18 L 7 -18 Z" fill="#ef4444" stroke="#991b1b" stroke-width="1"/>
      <text x="0" y="-42" font-family="'Montserrat', sans-serif" font-size="11" font-weight="700" fill="#f3f4f6" text-anchor="middle">N</text>
    </g>
    
    <!-- Cardinal directions -->
    <path d="M 35 0 L 18 -7 L 18 -2 L 0 -2 L 0 2 L 18 2 L 18 7 Z" fill="url(#lightBlue)"/>
    <text x="42" y="4" font-family="'Montserrat', sans-serif" font-size="11" font-weight="700" fill="#f3f4f6" text-anchor="middle">E</text>
    
    <path d="M 0 35 L -7 18 L -2 18 L -2 0 L 2 0 L 2 18 L 7 18 Z" fill="url(#lightBlue)"/>
    <text x="0" y="47" font-family="'Montserrat', sans-serif" font-size="11" font-weight="700" fill="#f3f4f6" text-anchor="middle">S</text>
    
    <path d="M -35 0 L -18 -7 L -18 -2 L 0 -2 L 0 2 L -18 2 L -18 7 Z" fill="url(#lightBlue)"/>
    <text x="-42" y="4" font-family="'Montserrat', sans-serif" font-size="11" font-weight="700" fill="#f3f4f6" text-anchor="middle">W</text>
    
    <!-- Diagonal lines -->
    <line x1="0" y1="0" x2="22" y2="-22" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="22" y2="22" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-22" y2="22" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-22" y2="-22" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#1e3a8a"/>
    <circle cx="0" cy="0" r="2.5" fill="#60a5fa"/>
  </g>
  
  <!-- Book pages -->
  <g transform="translate(250, 215)">
    <path d="M -30 0 L -30 35 Q -26 38 -22 35 L -22 3 Z" fill="#f3f4f6" stroke="#1e40af" stroke-width="2" opacity="0.9"/>
    <path d="M 30 0 L 30 35 Q 26 38 22 35 L 22 3 Z" fill="#f3f4f6" stroke="#1e40af" stroke-width="2" opacity="0.9"/>
    <rect x="-2" y="0" width="4" height="38" fill="url(#iconGrad)" rx="1"/>
    
    <!-- Page lines -->
    <line x1="-28" y1="8" x2="-24" y2="8" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="-28" y1="12" x2="-24" y2="12" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="-28" y1="16" x2="-24" y2="16" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="24" y1="8" x2="28" y2="8" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="24" y1="12" x2="28" y2="12" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="24" y1="16" x2="28" y2="16" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  </g>
  
  <!-- Stars -->
  <g fill="#60a5fa" opacity="0.4">
    <polygon points="165,140 168,147 175,147 169,152 172,159 165,154 158,159 161,152 155,147 162,147"/>
    <polygon points="335,240 338,247 345,247 339,252 342,259 335,254 328,259 331,252 325,247 332,247"/>
  </g>
  
  <!-- 3D COMPAS TEXT WITH DEPTH -->
  <g filter="url(#shadow)">
    <!-- 3D depth layers (back to front) -->
    <!-- Layer 5 (deepest) -->
    <text x="255" y="345" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
          font-size="68" font-weight="900" fill="#0f172a" text-anchor="middle" 
          letter-spacing="8" opacity="0.3">
      COMPAS
    </text>
    
    <!-- Layer 4 -->
    <text x="254" y="344" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
          font-size="68" font-weight="900" fill="#1e293b" text-anchor="middle" 
          letter-spacing="8" opacity="0.4">
      COMPAS
    </text>
    
    <!-- Layer 3 -->
    <text x="253" y="343" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
          font-size="68" font-weight="900" fill="#334155" text-anchor="middle" 
          letter-spacing="8" opacity="0.5">
      COMPAS
    </text>
    
    <!-- Layer 2 -->
    <text x="252" y="342" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
          font-size="68" font-weight="900" fill="url(#textSide)" text-anchor="middle" 
          letter-spacing="8" opacity="0.8">
      COMPAS
    </text>
    
    <!-- Top layer (main text) -->
    <text x="250" y="340" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
          font-size="68" font-weight="900" fill="url(#textTop)" text-anchor="middle" 
          letter-spacing="8" stroke="#1e3a8a" stroke-width="1">
      COMPAS
    </text>
    
    <!-- Highlight on top -->
    <text x="250" y="340" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
          font-size="68" font-weight="900" fill="url(#lightBlue)" text-anchor="middle" 
          letter-spacing="8" opacity="0.2" 
          style="clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%)">
      COMPAS
    </text>
  </g>
  
  <!-- Sharp decorative lines -->
  <g stroke-linecap="square">
    <line x1="95" y1="360" x2="150" y2="360" stroke="#1e40af" stroke-width="4"/>
    <line x1="95" y1="360" x2="105" y2="370" stroke="#3b82f6" stroke-width="2"/>
    
    <line x1="350" y1="360" x2="405" y2="360" stroke="#1e40af" stroke-width="4"/>
    <line x1="395" y1="360" x2="405" y2="370" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- Geometric accent shapes -->
  <polygon points="75,360 85,355 85,365" fill="#3b82f6" opacity="0.6"/>
  <polygon points="425,360 415,355 415,365" fill="#3b82f6" opacity="0.6"/>
  
  <!-- Subtitle -->
  <text x="250" y="390" font-family="'Montserrat', 'Helvetica', sans-serif" 
        font-size="22" font-weight="700" fill="#1e3a8a" text-anchor="middle" 
        letter-spacing="4" opacity="0.9">
    Rivojlanish markazi
  </text>
  
  <!-- Small embellishments -->
  <g opacity="0.5">
    <rect x="155" y="385" width="3" height="3" fill="#3b82f6" transform="rotate(45 156.5 386.5)"/>
    <rect x="342" y="385" width="3" height="3" fill="#3b82f6" transform="rotate(45 343.5 386.5)"/>
  </g>
  
  <!-- Tagline with angular brackets -->
  <g opacity="0.6">
    <text x="250" y="420" font-family="'Courier New', monospace" font-size="11" 
          font-weight="600" fill="#60a5fa" text-anchor="middle" letter-spacing="1">
      &lt; Bilim × Yo'nalish × Muvaffaqiyat &gt;
    </text>
  </g>
</svg>