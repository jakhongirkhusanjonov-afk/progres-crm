<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle - gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="needleGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <!-- Main circle with gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" />

  <!-- Inner white circle -->
  <circle cx="50" cy="50" r="42" fill="white" />

  <!-- Direction marks -->
  <text x="50" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">N</text>
  <text x="50" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#6b7280">S</text>
  <text x="12" y="54" text-anchor="middle" font-size="10" font-weight="bold" fill="#6b7280">W</text>
  <text x="88" y="54" text-anchor="middle" font-size="10" font-weight="bold" fill="#6b7280">E</text>

  <!-- Small tick marks -->
  <line x1="50" y1="12" x2="50" y2="18" stroke="#d1d5db" stroke-width="2" />
  <line x1="50" y1="82" x2="50" y2="88" stroke="#d1d5db" stroke-width="2" />
  <line x1="12" y1="50" x2="18" y2="50" stroke="#d1d5db" stroke-width="2" />
  <line x1="82" y1="50" x2="88" y2="50" stroke="#d1d5db" stroke-width="2" />

  <!-- NURMAKONs needle - North (Blue) -->
  <polygon points="50,22 44,50 50,45 56,50" fill="url(#needleGradient)" />

  <!-- NURMAKONs needle - South (Red) -->
  <polygon points="50,78 44,50 50,55 56,50" fill="url(#needleGradient2)" />

  <!-- Center circle -->
  <circle cx="50" cy="50" r="6" fill="#f97316" />
  <circle cx="50" cy="50" r="3" fill="white" />
</svg>
